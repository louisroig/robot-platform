; PlatformIO project configuration for xiao_bridge.
; Target: Seeed XIAO ESP32-S3 Sense (ESP32-S3R8, 8 MB flash, 8 MB PSRAM,
; OV2640 camera). See FW-XIAO §2 for the hardware spec.

[platformio]
default_envs = xiao_esp32s3

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; The OV2640 frame buffer (1600x1200 JPEG quality 12 → ~120-200 KB) lives
; in PSRAM, not internal SRAM (which is only 320 KB and shared with
; everything else). The Sense board has 8 MB PSRAM available.
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    ; Camera library convention: FF_PRINTF and friends. Silence the noisier
    ; chatter from the camera driver in Release builds; bench debugging can
    ; flip this to verbose.
    -D CORE_DEBUG_LEVEL=3

monitor_speed = 115200
upload_speed = 921600

; Library dependencies. esp32-camera ships with arduino-esp32 (no separate
; lib_deps entry needed); ESPmDNS and WebServer likewise. Listing them here
; explicitly anyway so a future maintainer doesn't have to grep arduino-esp32
; to discover what we depend on.
lib_deps =
    ; built into arduino-esp32 — listed for documentation:
    ;   esp32-camera   (OV2640 driver)
    ;   ESPmDNS        (mDNS responder)
    ;   WebServer      (HTTP server)
    ;   WiFi
